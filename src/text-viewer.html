<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Viewer - Satır Listesi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 h-screen font-sans">
  <div class="container mx-auto p-6 h-full flex flex-col">
    
    <header class="mb-6 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <h1 class="text-3xl font-bold text-indigo-600">Text Viewer</h1>
        <a href="index.html" class="text-sm text-gray-500 hover:text-indigo-600 underline">← JSON Tool'a Dön</a>
      </div>
      <div id="stats" class="text-sm font-medium text-gray-500">
        Toplam: <span id="line-count" class="text-indigo-600">0</span> Satır
      </div>
    </header>

    <div class="flex-1 flex flex-col md:flex-row gap-6 min-h-0">
      <textarea id="text-input"
        class="w-full md:w-1/2 p-4 border border-gray-300 rounded-lg shadow-inner focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm resize-none"
        placeholder="Her satırı yeni bir liste öğesi yapmak için buraya metin yapıştırın..."></textarea>

      <div class="w-full md:w-1/2 flex flex-col bg-white rounded-lg shadow-lg border border-gray-200 overflow-hidden">
        <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
          <span class="text-sm font-bold text-gray-700">Satır Listesi</span>
          <button id="clear-all" class="text-xs text-red-500 hover:text-red-700 font-semibold">Tümünü Temizle</button>
        </div>
        
        <div id="list-container" class="p-4 overflow-auto flex-1 space-y-2">
            <p class="text-gray-400 text-center mt-10 italic">Henüz veri girişi yapılmadı.</p>
        </div>
      </div>
    </div>

  </div>
  <script type="module" src="/src/text-viewer.ts"></script>
</body>
</html>
