<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>List Viewer - Satır Listesi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 h-screen font-sans">
  <div class="container mx-auto p-6 h-full flex flex-col">

    <header class="mb-6 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <h1 class="text-3xl font-bold text-indigo-600">List Viewer</h1>
        <div>
          <button type="button" id="dropdown-button"
            class="inline-flex justify-center items-center w-full rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
            Araçlar
            <svg class="-mr-1 ml-2 h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                clip-rule="evenodd" />
            </svg>
          </button>
        </div>

        <div id="dropdown-menu"
          class="hidden origin-top-left absolute left-0 mt-2 w-56 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-50 focus:outline-none">
          <div class="py-1" role="menu">
            <a href="list-viewer/list-viewer.html" target="_blank"
              class="group flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-indigo-500 hover:text-white transition-colors"
              role="menuitem">
              JSON Tool
              <svg class="ml-2 w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
              </svg>
            </a>
            <a href="#" class="block px-4 py-2 text-sm text-indigo-600 font-bold bg-indigo-50" role="menuitem"> Text
              Viewer(Aktif)</a>



            <a href="json-query-help-examples.html" target="_blank"
              class="group flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-indigo-500 hover:text-white transition-colors"
              role="menuitem">
              JSON Diff Checker
            </a>
          </div>
        </div>
      </div>
      <div id="stats" class="text-sm font-medium text-gray-500">
        Toplam: <span id="line-count" class="text-indigo-600">0</span> Satır
      </div>
    </header>

    <div class="flex-1 flex flex-col md:flex-row gap-6 min-h-0">
      <textarea id="text-input"
        class="w-full md:w-1/2 p-4 border border-gray-300 rounded-lg shadow-inner focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm resize-none"
        placeholder="Her satırı yeni bir liste öğesi yapmak için buraya metin yapıştırın..."></textarea>

      <div class="w-full md:w-1/2 flex flex-col bg-white rounded-lg shadow-lg border border-gray-200 overflow-hidden">
        <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
          <span class="text-sm font-bold text-gray-700">Satır Listesi</span>
          <button id="clear-all" class="text-xs text-red-500 hover:text-red-700 font-semibold">Tümünü Temizle</button>
        </div>

        <div id="list-container" class="p-4 overflow-auto flex-1 space-y-2">
          <p class="text-gray-400 text-center mt-10 italic">Henüz veri girişi yapılmadı.</p>
        </div>
      </div>
    </div>

  </div>
  <script type="module" src="/src/list-viewer/list-viewer.ts"></script>
</body>

</html>
